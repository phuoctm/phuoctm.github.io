<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Signing you in…</title>

  <!--
    OAuth callback for the Operational KPIs dashboard.

    This is intentionally tiny. The only thing on this page is
    Qlik's official OAuth callback handler script, which:
      • parses the auth code from the URL,
      • exchanges it for a token,
      • stores it in the same storage as the parent page
        (sessionStorage by default),
      • closes / redirects back.

    This handler is a minimal IIFE that does NOT use `eval`,
    so it works under strict CSPs. Do not replace it with the
    full `@qlik/embed-web-components` bundle.

    The data-host MUST match the host in the main dashboard.
  -->

  <script
    crossorigin="anonymous"
    type="application/javascript"
    data-host="https://reaktor.eu.qlikcloud.com"
    src="https://cdn.jsdelivr.net/npm/@qlik/api@2/oauth-callback.iife.js"
  ></script>

  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #F7F4EE;
      color: #16140E;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .box { text-align: center; padding: 32px 40px; }
    .dot {
      width: 8px; height: 8px;
      background: #D54B17;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    p { font-size: 14px; color: #6B6358; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <span class="dot"></span>
    <p>Completing Qlik sign-in…</p>
  </div>
</body>
</html>
