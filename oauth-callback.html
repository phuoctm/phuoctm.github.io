<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signing you in…</title>

  <!--
    OAuth callback for the Operational KPIs dashboard.

    Place this file at exactly the path you registered as
    the Redirect URI for your Qlik OAuth2 SPA client
    (e.g. https://localhost:8443/oauth-callback.html).

    Per https://qlik.dev/embed/qlik-embed/authenticate/connect-qlik-embed/
    this page must load the dedicated OAuth callback handler
    from @qlik/api — it finishes the token exchange, hands the
    token to the opener page, and closes the popup.
  -->

  <script
    crossorigin="anonymous"
    type="application/javascript"
    data-host="https://reaktor.eu.qlikcloud.com"
    src="https://cdn.jsdelivr.net/npm/@qlik/api@2/oauth-callback.iife.js"
  ></script>

  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #F7F4EE;
      color: #16140E;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 32px 40px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #D54B17;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    p { font-size: 14px; color: #6B6358; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <span class="dot"></span>
    <p>Completing Qlik sign-in…</p>
  </div>
</body>
</html>
